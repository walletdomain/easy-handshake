<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Handshake — Settings</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
  <style>
    .settings-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 720px;
    }
    .settings-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .settings-section-title {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .settings-rows { padding: 0.5rem 0; }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-label {
      flex: 1;
      min-width: 0;
    }
    .settings-label-text {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
    }
    .settings-label-desc {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.15rem;
      line-height: 1.4;
    }
    .settings-control { flex-shrink: 0; }
    .settings-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      padding: 0.35rem 0.6rem;
      width: 140px;
      transition: border-color 0.15s;
    }
    .settings-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .settings-input.wide { width: 220px; }
    /* Toggle switch */
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 11px;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track {
      background: var(--accent2);
    }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(18px);
    }
    .toggle.disabled { opacity: 0.4; pointer-events: none; }
    /* Deployment type radio */
    .deploy-options {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .deploy-option {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--muted);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .deploy-option:hover    { border-color: var(--accent); color: var(--text); }
    .deploy-option.selected {
      border-color: var(--accent);
      background: #1c2433;
      color: var(--text);
    }
    .deploy-option input { display: none; }
    /* Restart badge */
    .restart-badge {
      font-size: 0.62rem;
      background: var(--warn);
      color: #000;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-family: 'Space Mono', monospace;
      white-space: nowrap;
    }
    /* Action bar */
    .settings-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
    }
    .btn-save {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.6rem 1.5rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover    { background: #79b8ff; }
    .btn-save:disabled { opacity: 0.5; cursor: default; }
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.82rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
    .save-status {
      font-size: 0.78rem;
      font-family: 'Space Mono', monospace;
    }
    .save-status.ok  { color: var(--accent2); }
    .save-status.err { color: var(--danger); }
    /* Coming soon overlay */
    .coming-soon {
      font-size: 0.65rem;
      background: var(--surface2);
      color: var(--muted);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img src="/hns-logo.svg" alt="Handshake" class="header-logo">
      <h1>Easy Handshake</h1>
      <span class="version">v1.0.0</span>
    </div>
    <a href="/" style="text-decoration:none">
      <span class="status-badge" id="status-badge">← Dashboard</span>
    </a>
  </header>

  <a href="/" class="back-link">← Back to Dashboard</a>

  <div class="section-title">⚙ Settings</div>

  <div class="settings-grid" id="settings-grid">
    <div style="color:var(--muted);font-size:0.8rem;padding:2rem;text-align:center">
      Loading settings...
    </div>
  </div>

  <script src="/settings.js"></script>
</body>
</html>
