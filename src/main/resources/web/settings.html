<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Handshake — Settings</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
  <style>
    /* ── Two-column layout ── */
    .settings-layout {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }
    .settings-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Restart banner ── */
    .restart-banner {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(210,153,34,0.12);
      border: 1px solid var(--warn);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      transition: opacity 0.2s;
    }
    .restart-banner.hidden { display: none; }
    .restart-banner-msg {
      flex: 1;
      font-size: 0.82rem;
      color: var(--warn);
    }
    .btn-restart {
      background: var(--warn);
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.45rem 1rem;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      white-space: nowrap;
    }
    .btn-restart:hover { background: #e5a800; }

    /* ── Section cards ── */
    .settings-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .settings-section-title {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .settings-rows { padding: 0.25rem 0; }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { flex: 1; min-width: 0; overflow: hidden; }
    .settings-label-text {
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .settings-label-desc {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.1rem;
      line-height: 1.4;
    }
    .settings-control { flex-shrink: 0; min-width: 0; }
    .settings-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      padding: 0.3rem 0.55rem;
      width: 120px;
      transition: border-color 0.15s;
    }
    .settings-input:focus { outline: none; border-color: var(--accent); }
    .settings-input.wide  { width: 200px; }

    /* ── Toggle ── */
    .toggle {
      position: relative;
      width: 38px;
      height: 21px;
      cursor: pointer;
      flex-shrink: 0;
      display: block;
    }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 11px;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track {
      background: #2ea043;
    }
    .toggle-thumb {
      position: absolute;
      top: 2.5px;
      left: 2.5px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      z-index: 1;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(17px); }
    .toggle.disabled { opacity: 0.4; pointer-events: none; }

    /* ── Deployment radio buttons ── */
    .deploy-options { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .deploy-option {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.65rem;
      cursor: pointer;
      font-size: 0.72rem;
      color: var(--muted);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .deploy-option:hover { border-color: var(--accent); color: var(--text); }
    .deploy-option.selected { border-color: var(--accent); background: #1c2433; color: var(--text); }
    .deploy-option input { display: none; }

    /* ── Action bar ── */
    .settings-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 0 0.5rem;
    }
    .btn-save {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.6rem 1.5rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover    { background: #79b8ff; }
    .btn-save:disabled { opacity: 0.5; cursor: default; }
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.82rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
    .save-status { font-size: 0.78rem; font-family: 'Space Mono', monospace; }
    .save-status.ok  { color: var(--accent2); }
    .save-status.err { color: var(--danger); }

    /* ── Coming soon tag ── */
    .coming-soon {
      font-size: 0.62rem;
      background: var(--surface2);
      color: var(--muted);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
    }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      .settings-layout { flex-direction: column; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <img src="/hns-logo.svg" alt="Handshake" class="header-logo">
    <h1>Easy Handshake</h1>
    <span class="version">v1.0.0</span>
  </div>
  <a href="/" style="text-decoration:none">
    <span class="status-badge">← Dashboard</span>
  </a>
</header>

<div class="section-title" style="margin-bottom:1rem">⚙ Settings</div>

<!-- Restart required banner -->
<div class="restart-banner hidden" id="restart-banner">
    <span class="restart-banner-msg">
      ⚠ Some changes require a node restart to take effect.
    </span>
  <button class="btn-restart" onclick="saveAndShowRestart()">Save Changes</button>
  <button class="btn-secondary" style="font-size:0.72rem;padding:0.35rem 0.7rem"
          onclick="resetForm()">Reset</button>
</div>

<!-- Settings columns -->
<div class="settings-layout">
  <!-- Left column: Deployment + Network -->
  <div class="settings-col" id="col-left">
    <div style="color:var(--muted);font-size:0.8rem;padding:1rem">Loading...</div>
  </div>
  <!-- Right column: Modules + DNS + Seeds -->
  <div class="settings-col" id="col-right"></div>
</div>

<!-- Action bar (Save / Reset for non-restart settings) -->
<div class="settings-actions">
  <button class="btn-save" id="btn-save" onclick="saveChanges()" disabled>
    Save Changes
  </button>
  <button class="btn-secondary" onclick="resetForm()">Reset</button>
  <span class="save-status" id="save-status"></span>
</div>

<script src="/settings.js"></script>
</body>
</html>
